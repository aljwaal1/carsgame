name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - chatgpt-v3-real-retro
      - v4-from-scratch
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android
        run: |
          flutter create --platforms=android --org com.explapp .
          rm -rf test
          flutter pub get

      - name: Force package and app name
        run: |
          sed -i "s/applicationId = \"com.example.retro_games_ar\"/applicationId = \"com.explapp.retrogamesar\"/g" android/app/build.gradle || true
          sed -i "s/applicationId \"com.example.retro_games_ar\"/applicationId \"com.explapp.retrogamesar\"/g" android/app/build.gradle || true
          sed -i 's/android:label="retro_games_ar"/android:label="ألعاب زمان V4"/g' android/app/src/main/AndroidManifest.xml || true

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/retro-games-ar.apk
          cat > DOWNLOAD_APK.md <<TXT
          # تحميل التطبيق

          APK:
          https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}/apk/retro-games-ar.apk
          TXT

      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/retro-games-ar.apk DOWNLOAD_APK.md
          git commit -m "Build Retro Games APK" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }}
